<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop | Elegant Bracelet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --pink-light:#FBEEF0;
    --pink-soft:#F3D9DE;
    --pink-mid:#E9C4CC;
    --cream:#FFF9F5;
    --olive:#7C8B5E;
    --olive-dark:#5C6B41;
    --olive-pale:#DCE3CC;
    --text-dark:#3A3630;
    --text-mute:#7A736C;
    --gold:#C9A66B;
    --white:#FFFFFF;
    --radius:14px;
    --shadow:0 6px 20px rgba(92,107,65,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Poppins',sans-serif;
    background:var(--cream);
    color:var(--text-dark);
    overflow-x:hidden;
  }
  h1,h2,h3,.logo,.price,.section-title{font-family:'Cormorant Garamond',serif;}
  a{text-decoration:none;color:inherit;}
  img{display:block;max-width:100%;}
  button{font-family:'Poppins',sans-serif;cursor:pointer;border:none;background:none;}

  /* ---------- Loading Spinner ---------- */
  #loader{
    position:fixed;inset:0;background:var(--cream);
    display:flex;align-items:center;justify-content:center;
    z-index:9999;transition:opacity .5s ease;
  }
  .spinner{
    width:44px;height:44px;border-radius:50%;
    border:3px solid var(--pink-soft);
    border-top-color:var(--olive);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  #loader.hide{opacity:0;pointer-events:none;}

  /* ---------- Header ---------- */
  header{
    position:sticky;top:0;z-index:500;
    background:rgba(255,249,245,0.96);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--pink-soft);
  }
  .header-top{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;
  }
  .logo{font-size:1.5rem;font-weight:600;color:var(--olive-dark);letter-spacing:.5px;}
  .header-icons{display:flex;align-items:center;gap:16px;}
  .icon-btn{position:relative;font-size:1.25rem;color:var(--olive-dark);}
  .cart-badge{
    position:absolute;top:-6px;right:-9px;
    background:var(--gold);color:#fff;
    font-size:.62rem;font-weight:600;
    width:17px;height:17px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Poppins',sans-serif;
  }
  .hamburger{display:flex;flex-direction:column;gap:4px;width:24px;cursor:pointer;}
  .hamburger span{height:2px;background:var(--olive-dark);border-radius:2px;transition:.3s;}

  .search-bar{
    padding:0 18px 14px;
    display:flex;gap:8px;
  }
  .search-bar input{
    flex:1;padding:10px 14px;border-radius:24px;
    border:1px solid var(--pink-mid);background:var(--white);
    font-size:.85rem;color:var(--text-dark);
  }
  .search-bar input:focus{outline:2px solid var(--olive);outline-offset:1px;}

  /* ---------- Side Nav ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(58,54,48,0.35);
    opacity:0;pointer-events:none;transition:.3s;z-index:600;
  }
  .overlay.active{opacity:1;pointer-events:auto;}
  .side-nav{
    position:fixed;top:0;right:-280px;width:260px;height:100%;
    background:var(--white);z-index:700;
    box-shadow:-4px 0 20px rgba(0,0,0,0.1);
    transition:right .35s ease;
    padding:24px 0;
    display:flex;flex-direction:column;
  }
  .side-nav.active{right:0;}
  .side-nav-close{align-self:flex-end;margin:0 20px 20px;font-size:1.4rem;color:var(--olive-dark);}
  .side-nav a{
    padding:14px 26px;font-size:1.05rem;color:var(--text-dark);
    border-left:3px solid transparent;
  }
  .side-nav a.active-link{
    border-left-color:var(--olive);color:var(--olive-dark);font-weight:600;
    background:var(--pink-light);
  }

  /* ---------- Page Heading ---------- */
  .shop-hero{
    text-align:center;padding:30px 20px 10px;
  }
  .shop-hero h1{font-size:2.1rem;color:var(--olive-dark);font-weight:600;}
  .shop-hero p{font-size:.85rem;color:var(--text-mute);margin-top:6px;font-style:italic;}
  .result-count{
    padding:0 18px 6px;font-size:.78rem;color:var(--text-mute);
  }

  /* ---------- Product Grid ---------- */
  .grid{
    display:grid;grid-template-columns:1fr 1fr;
    gap:14px;padding:10px 14px 30px;
  }
  .card{
    background:var(--white);border-radius:var(--radius);
    overflow:hidden;box-shadow:var(--shadow);
    display:flex;flex-direction:column;
    animation:fadeUp .5s ease both;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .card.hidden{display:none;}
  .card-img-wrap{position:relative;aspect-ratio:1/1;overflow:hidden;background:var(--pink-light);}
  .card-img-wrap img{width:100%;height:100%;object-fit:cover;cursor:pointer;transition:transform .4s;}
  .card-img-wrap img:active{transform:scale(0.97);}
  .wishlist-btn{
    position:absolute;top:8px;right:8px;
    width:30px;height:30px;border-radius:50%;
    background:rgba(255,255,255,0.9);
    display:flex;align-items:center;justify-content:center;
    font-size:1rem;color:var(--pink-mid);
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
    z-index:2;
  }
  .wishlist-btn.active{color:#D5677A;}
  .badge{
    position:absolute;top:8px;left:8px;
    font-size:.6rem;font-weight:600;letter-spacing:.4px;
    padding:3px 8px;border-radius:10px;color:#fff;z-index:2;
  }
  .badge.new{background:var(--olive);}
  .badge.sale{background:#C97A6D;}
  .photo-count{
    position:absolute;bottom:8px;right:8px;
    background:rgba(0,0,0,0.45);color:#fff;
    font-size:.62rem;padding:2px 7px;border-radius:10px;
    display:flex;align-items:center;gap:3px;z-index:2;
  }

  .card-body{padding:10px 12px 12px;display:flex;flex-direction:column;gap:6px;flex:1;}
  .card-name{font-size:1.05rem;font-weight:600;color:var(--text-dark);line-height:1.15;}
  .card-desc{font-size:.7rem;color:var(--text-mute);line-height:1.35;min-height:28px;}
  .card-price-row{display:flex;align-items:baseline;gap:6px;}
  .price{font-size:1.15rem;color:var(--olive-dark);font-weight:600;}
  .price-old{font-size:.75rem;color:var(--text-mute);text-decoration:line-through;}

  .qty-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
  .stepper{display:flex;align-items:center;border:1px solid var(--pink-mid);border-radius:20px;overflow:hidden;}
  .stepper button{width:26px;height:26px;font-size:.95rem;color:var(--olive-dark);background:var(--pink-light);}
  .stepper span{width:24px;text-align:center;font-size:.8rem;font-weight:500;}
  .add-btn{
    background:var(--olive);color:#fff;font-size:.72rem;font-weight:500;
    padding:8px 12px;border-radius:20px;letter-spacing:.3px;
    transition:background .2s;white-space:nowrap;
  }
  .add-btn:active{background:var(--olive-dark);}
  .add-btn.added{background:var(--olive-dark);}

  /* ---------- Lightbox ---------- */
  .lightbox{
    position:fixed;inset:0;background:rgba(30,28,24,0.92);
    z-index:900;display:none;align-items:center;justify-content:center;
    flex-direction:column;
  }
  .lightbox.active{display:flex;}
  .lightbox-close{
    position:absolute;top:18px;right:20px;color:#fff;font-size:1.6rem;z-index:2;
  }
  .lightbox-track-wrap{
    width:100%;max-width:420px;aspect-ratio:1/1;position:relative;overflow:hidden;
    touch-action:pan-y;
  }
  .lightbox-track{display:flex;height:100%;transition:transform .35s ease;}
  .lightbox-track img{width:100%;height:100%;object-fit:cover;flex-shrink:0;}
  .lightbox-arrow{
    position:absolute;top:50%;transform:translateY(-50%);
    width:38px;height:38px;border-radius:50%;
    background:rgba(255,255,255,0.15);color:#fff;font-size:1.2rem;
    display:flex;align-items:center;justify-content:center;z-index:2;
  }
  .lightbox-arrow.prev{left:10px;}
  .lightbox-arrow.next{right:10px;}
  .lightbox-dots{display:flex;gap:6px;margin-top:14px;}
  .lightbox-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.4);}
  .lightbox-dots span.active{background:var(--gold);}
  .lightbox-info{color:#fff;text-align:center;margin-top:14px;padding:0 20px;}
  .lightbox-info h3{font-size:1.3rem;}
  .lightbox-info .price{color:var(--gold);font-size:1.1rem;}

  /* ---------- Toast ---------- */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--olive-dark);color:#fff;
    padding:11px 20px;border-radius:24px;font-size:.8rem;
    opacity:0;transition:.35s;z-index:1000;box-shadow:var(--shadow);
    white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ---------- Footer ---------- */
  footer{
    background:var(--olive-dark);color:var(--pink-light);
    padding:36px 22px 26px;margin-top:10px;
  }
  footer h3{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:#fff;margin-bottom:12px;}
  .footer-contact p{font-size:.85rem;margin-bottom:8px;opacity:.9;display:flex;gap:8px;align-items:center;}
  .footer-social{display:flex;gap:14px;margin-top:14px;}
  .footer-social a{
    width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.1);
    display:flex;align-items:center;justify-content:center;font-size:.95rem;color:#fff;
  }
  .footer-bottom{
    text-align:center;font-size:.72rem;opacity:.7;margin-top:26px;
    border-top:1px solid rgba(255,255,255,0.12);padding-top:16px;
  }

  .empty-state{
    grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--text-mute);
  }
  .empty-state span{font-size:2rem;display:block;margin-bottom:8px;}

  @media(min-width:640px){
    .grid{grid-template-columns:repeat(3,1fr);max-width:900px;margin:0 auto;}
  }
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<div class="overlay" id="overlay"></div>
<nav class="side-nav" id="sideNav">
  <span class="side-nav-close" id="navClose">&times;</span>
  <a href="index.html">Home</a>
  <a href="shop.html" class="active-link">Shop</a>
  <a href="index.html#why-choose-us">About Us</a>
  <a href="cart.html">Cart</a>
  <a href="#siteFooter">Contact</a>
</nav>

<header>
  <div class="header-top">
    <a href="index.html" class="logo">Elegant Bracelet</a>
    <div class="header-icons">
      <a href="cart.html" class="icon-btn" aria-label="Cart">🛍
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
      <div class="hamburger" id="hamburgerBtn" aria-label="Menu">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search bracelets, rings, quality...">
  </div>
</header>

<section class="shop-hero">
  <h1>The Full Collection</h1>
  <p>Handcrafted pieces, made to be worn every day</p>
</section>
<p class="result-count" id="resultCount"></p>

<main class="grid" id="productGrid"></main>

<footer id="siteFooter">
  <h3>Elegant Bracelet</h3>
  <div class="footer-contact">
    <p>📞 +91 98765 43210</p>
    <p>✉️ hello@elegantbracelet.com</p>
    <p>🌐 www.elegantbracelet.com</p>
  </div>
  <div class="footer-social">
    <a href="#" aria-label="Facebook">f</a>
    <a href="#" aria-label="Instagram">ig</a>
    <a href="#" aria-label="WhatsApp">wa</a>
  </div>
  <div class="footer-bottom">&copy; 2026 Elegant Bracelet. All rights reserved.</div>
</footer>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightboxClose">&times;</span>
  <div class="lightbox-track-wrap" id="lightboxTrackWrap">
    <div class="lightbox-track" id="lightboxTrack"></div>
    <div class="lightbox-arrow prev" id="lbPrev">&#8249;</div>
    <div class="lightbox-arrow next" id="lbNext">&#8250;</div>
  </div>
  <div class="lightbox-dots" id="lightboxDots"></div>
  <div class="lightbox-info">
    <h3 id="lbName"></h3>
    <p class="price" id="lbPrice"></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------------- Data ---------------- */
const PRODUCTS = [
  {
    id:'p1', name:'Willow Charm Bracelet',
    desc:'Sterling silver chain with hand-set moonstone charm.',
    price:1899, oldPrice:null, badge:'new',
    images:[
      
      'https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=500&q=80',
      'https://images.unsplash.com/photo-1620656798579-1984d9e87df7?w=500&q=80'
    ]
  },
  {
    id:'p2', name:'Olive Leaf Cuff',
    desc:'Oxidised brass cuff, adjustable, matte finish.',
    price:1499, oldPrice:1899, badge:'sale',
    images:[
      'https://images.unsplash.com/photo-1573408301185-9146fe634ad0?w=500&q=80',
      'https://images.unsplash.com/photo-1608042314453-ae338d80c427?w=500&q=80',
      'https://images.unsplash.com/photo-1599643477877-530eb83abc8e?w=500&q=80'
    ]
  },
  {
    id:'p3', name:'Rosé Beaded Wrap',
    desc:'Triple-wrap freshwater pearl and rose quartz beads.',
    price:2199, oldPrice:null, badge:null,
    images:[
      'https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=500&q=80',
      'https://images.unsplash.com/photo-1611085583191-a3b181a88401?w=500&q=80',
      'https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=500&q=80'
    ]
  },
  {
    id:'p4', name:'Sage Knot Bangle',
    desc:'Hand-braided cord bangle with brushed gold clasp.',
    price:999, oldPrice:null, badge:'new',
    images:[
      'https://images.unsplash.com/photo-1620656798579-1984d9e87df7?w=500&q=80',
      'https://images.unsplash.com/photo-1573408301185-9146fe634ad0?w=500&q=80',
      'https://images.unsplash.com/photo-1608042314453-ae338d80c427?w=500&q=80'
    ]
  },
  {
    id:'p5', name:'Blush Layered Chain',
    desc:'Three fine chains layered with tiny enamel hearts.',
    price:1699, oldPrice:2099, badge:'sale',
    images:[
      'https://images.unsplash.com/photo-1599643477877-530eb83abc8e?w=500&q=80',
      'https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=500&q=80',
      'https://images.unsplash.com/photo-1620656798579-1984d9e87df7?w=500&q=80'
    ]
  },
  {
    id:'p6', name:'Meadow Stone Cuff',
    desc:'Wide cuff set with a raw citrine centre stone.',
    price:2499, oldPrice:null, badge:null,
    images:[
      'https://images.unsplash.com/photo-1608042314453-ae338d80c427?w=500&q=80',
      'https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=500&q=80',
      'https://images.unsplash.com/photo-1573408301185-9146fe634ad0?w=500&q=80'
    ]
  },
  {
    id:'p7', name:'Ivy Vine Bracelet',
    desc:'Delicate vine-motif band in 14k gold plating.',
    price:1799, oldPrice:null, badge:'new',
    images:[
      'https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=500&q=80',
      'https://images.unsplash.com/photo-1620656798579-1984d9e87df7?w=500&q=80',
      'https://images.unsplash.com/photo-1611085583191-a3b181a88401?w=500&q=80'
    ]
  },
  {
    id:'p8', name:'Terra Clay Beaded Set',
    desc:'Set of 2 handmade terracotta bead bracelets.',
    price:1299, oldPrice:1599, badge:'sale',
    images:[
      'https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=500&q=80',
      'https://images.unsplash.com/photo-1608042314453-ae338d80c427?w=500&q=80',
      'https://images.unsplash.com/photo-1611085583191-a3b181a88401?w=500&q=80'
    ]
  }
];

/* ---------------- Storage Helpers ---------------- */
function getCart(){ return JSON.parse(localStorage.getItem('eb_cart') || '[]'); }
function setCart(c){ localStorage.setItem('eb_cart', JSON.stringify(c)); updateCartBadge(); }
function getWishlist(){ return JSON.parse(localStorage.getItem('eb_wishlist') || '[]'); }
function setWishlist(w){ localStorage.setItem('eb_wishlist', JSON.stringify(w)); }

function updateCartBadge(){
  const cart = getCart();
  const count = cart.reduce((sum,i)=>sum+i.qty,0);
  document.getElementById('cartBadge').textContent = count;
}

/* ---------------- Quantity state (per-card, pre-cart) ---------------- */
const qtyState = {};
PRODUCTS.forEach(p=>qtyState[p.id]=1);

/* ---------------- Render Grid ---------------- */
const grid = document.getElementById('productGrid');
const resultCount = document.getElementById('resultCount');

function renderGrid(list){
  grid.innerHTML = '';
  if(list.length === 0){
    grid.innerHTML = `<div class="empty-state"><span>🔍</span>No pieces match your search.<br>Try a different keyword.</div>`;
    resultCount.textContent = '';
    return;
  }
  resultCount.textContent = `${list.length} piece${list.length>1?'s':''}`;
  const wishlist = getWishlist();
  list.forEach((p,idx)=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (idx*0.04)+'s';
    const isWished = wishlist.includes(p.id);
    card.innerHTML = `
      <div class="card-img-wrap" data-id="${p.id}">
        ${p.badge==='new' ? '<span class="badge new">New</span>' : ''}
        ${p.badge==='sale' ? '<span class="badge sale">Sale</span>' : ''}
        <button class="wishlist-btn ${isWished?'active':''}" data-id="${p.id}" aria-label="Wishlist">${isWished?'♥':'♡'}</button>
        <img src="${p.images[0]}" alt="${p.name}" data-open="${p.id}">
        <span class="photo-count">📷 ${p.images.length}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-price-row">
          <span class="price">₹${p.price}</span>
          ${p.oldPrice ? `<span class="price-old">₹${p.oldPrice}</span>` : ''}
        </div>
        <div class="qty-row">
          <div class="stepper">
            <button data-dec="${p.id}">−</button>
            <span id="qty-${p.id}">1</span>
            <button data-inc="${p.id}">+</button>
          </div>
          <button class="add-btn" data-add="${p.id}">Add to Cart</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}
renderGrid(PRODUCTS);

/* ---------------- Grid interactions ---------------- */
grid.addEventListener('click', (e)=>{
  const decId = e.target.dataset.dec;
  const incId = e.target.dataset.inc;
  const addId = e.target.dataset.add;
  const openId = e.target.dataset.open;
  const wishId = e.target.closest('.wishlist-btn')?.dataset.id;

  if(decId){
    qtyState[decId] = Math.max(1, qtyState[decId]-1);
    document.getElementById('qty-'+decId).textContent = qtyState[decId];
  }
  if(incId){
    qtyState[incId] = Math.min(9, qtyState[incId]+1);
    document.getElementById('qty-'+incId).textContent = qtyState[incId];
  }
  if(addId){
    const product = PRODUCTS.find(p=>p.id===addId);
    const cart = getCart();
    const existing = cart.find(i=>i.id===addId);
    const qty = qtyState[addId];
    if(existing){ existing.qty += qty; } else {
      cart.push({id:product.id, name:product.name, price:product.price, image:product.images[0], qty});
    }
    setCart(cart);
    showToast(`${product.name} added to cart`);
    const btn = e.target;
    btn.classList.add('added');
    btn.textContent = 'Added ✓';
    setTimeout(()=>{ btn.classList.remove('added'); btn.textContent='Add to Cart'; },1200);
  }
  if(openId){ openLightbox(openId); }
  if(wishId){
    let wishlist = getWishlist();
    if(wishlist.includes(wishId)){
      wishlist = wishlist.filter(id=>id!==wishId);
      e.target.classList.remove('active');
      e.target.textContent = '♡';
      showToast('Removed from wishlist');
    } else {
      wishlist.push(wishId);
      e.target.classList.add('active');
      e.target.textContent = '♥';
      showToast('Added to wishlist');
    }
    setWishlist(wishlist);
  }
});

/* ---------------- Search (synced) ---------------- */
const searchInput = document.getElementById('searchInput');
function applySearch(term){
  const t = term.trim().toLowerCase();
  const filtered = PRODUCTS.filter(p =>
    p.name.toLowerCase().includes(t) || p.desc.toLowerCase().includes(t)
  );
  renderGrid(filtered);
}
searchInput.addEventListener('input', ()=>applySearch(searchInput.value));

// Pick up ?search= from URL (set by index.html search bar)
const urlParams = new URLSearchParams(window.location.search);
if(urlParams.get('search')){
  searchInput.value = urlParams.get('search');
  applySearch(searchInput.value);
}

/* ---------------- Lightbox ---------------- */
const lightbox = document.getElementById('lightbox');
const lbTrack = document.getElementById('lightboxTrack');
const lbDots = document.getElementById('lightboxDots');
const lbName = document.getElementById('lbName');
const lbPrice = document.getElementById('lbPrice');
let lbIndex = 0;
let lbImages = [];

function openLightbox(id){
  const product = PRODUCTS.find(p=>p.id===id);
  lbImages = product.images;
  lbIndex = 0;
  lbName.textContent = product.name;
  lbPrice.textContent = `₹${product.price}`;
  lbTrack.innerHTML = lbImages.map(src=>`<img src="${src}" alt="${product.name}">`).join('');
  lbDots.innerHTML = lbImages.map((_,i)=>`<span class="${i===0?'active':''}"></span>`).join('');
  updateLightboxPos();
  lightbox.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(){
  lightbox.classList.remove('active');
  document.body.style.overflow = '';
}
function updateLightboxPos(){
  lbTrack.style.transform = `translateX(-${lbIndex*100}%)`;
  [...lbDots.children].forEach((d,i)=>d.classList.toggle('active', i===lbIndex));
}
document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
lightbox.addEventListener('click', (e)=>{ if(e.target===lightbox) closeLightbox(); });
document.getElementById('lbPrev').addEventListener('click', ()=>{
  lbIndex = (lbIndex-1+lbImages.length)%lbImages.length; updateLightboxPos();
});
document.getElementById('lbNext').addEventListener('click', ()=>{
  lbIndex = (lbIndex+1)%lbImages.length; updateLightboxPos();
});

// Touch swipe
let touchStartX = 0;
const trackWrap = document.getElementById('lightboxTrackWrap');
trackWrap.addEventListener('touchstart', e=>{ touchStartX = e.touches[0].clientX; });
trackWrap.addEventListener('touchend', e=>{
  const diff = e.changedTouches[0].clientX - touchStartX;
  if(diff > 40){ lbIndex = (lbIndex-1+lbImages.length)%lbImages.length; updateLightboxPos(); }
  else if(diff < -40){ lbIndex = (lbIndex+1)%lbImages.length; updateLightboxPos(); }
});

/* ---------------- Toast ---------------- */
let toastTimer;
function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove('show'), 2000);
}

/* ---------------- Side Nav ---------------- */
const hamburgerBtn = document.getElementById('hamburgerBtn');
const sideNav = document.getElementById('sideNav');
const overlay = document.getElementById('overlay');
const navClose = document.getElementById('navClose');
function openNav(){ sideNav.classList.add('active'); overlay.classList.add('active'); }
function closeNav(){ sideNav.classList.remove('active'); overlay.classList.remove('active'); }
hamburgerBtn.addEventListener('click', openNav);
navClose.addEventListener('click', closeNav);
overlay.addEventListener('click', closeNav);

/* ---------------- Init ---------------- */
/* Hide spinner on DOM ready with its own timer, instead of waiting for
   every image to finish loading — some previews (like Acode) can't
   reach external image URLs and window.onload would hang forever. */
document.addEventListener('DOMContentLoaded', ()=>{
  updateCartBadge();
  setTimeout(()=>{ document.getElementById('loader').classList.add('hide'); }, 350);
});
/* Safety net: force-hide the loader no matter what after 2s */
setTimeout(()=>{ document.getElementById('loader').classList.add('hide'); }, 2000);
</script>
